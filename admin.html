<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Eco Enzim</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;margin:0;background:linear-gradient(135deg,#031a2e,#083a59);color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:min(460px,100%);background:rgba(255,255,255,.95);color:#0f172a;border-radius:22px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.22)}
    h1{margin-top:0;font-size:1.5rem}
    p{color:#5f6f82;line-height:1.6}
    input{width:100%;padding:.95rem 1rem;border:1px solid #dcecff;border-radius:999px;outline:none;margin-top:.8rem}
    button{margin-top:1rem;width:100%;padding:.95rem 1rem;border:0;border-radius:999px;background:#69cfff;color:#04253d;font-weight:700;cursor:pointer}
    .note{font-size:.95rem;margin-top:.8rem;color:#5f6f82}
    a{color:#0b5a7c;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <h1>Halaman Admin</h1>
    <p>Masuk untuk membuka mode edit narasi dan gambar. Setelah masuk, perubahan akan disimpan dan tampil untuk publik lewat halaman utama.</p>
    <form id="admin-login-form">
      <input id="admin-password" type="password" placeholder="Ketik password admin" />
      <button type="submit">Masuk ke mode admin</button>
    </form>
    <p class="note">Password demo: <strong>demangan2026</strong></p>
    <p id="admin-message"></p>
    <p><a href="index.html">← Kembali ke halaman utama</a></p>
  </div>
  <script>
    const form = document.getElementById('admin-login-form');
    const msg = document.getElementById('admin-message');
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      const pass = document.getElementById('admin-password').value;
      if (pass === 'demangan2026') {
        localStorage.setItem('ecoEnzimAdmin', 'true');
        window.location.href = 'index.html?owner=demangan2026';
      } else {
        msg.textContent = 'Password salah. Coba lagi.';
        msg.style.color = '#e23b3b';
      }
    });
  </script>
</body>
</html>
