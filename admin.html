<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Eco Enzim</title>
  <style>
    body{font-family:'Inter',system-ui,Arial,sans-serif;margin:0;background:linear-gradient(135deg,#031a2e,#083a59);color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:min(460px,100%);background:rgba(255,255,255,.95);color:#0f172a;border-radius:24px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    h1{margin-top:0;font-size:1.8rem;color:#031a2e;text-align:center;margin-bottom:.5rem}
    p{color:#475569;line-height:1.6;text-align:center;margin-bottom:1.5rem}
    input{margin-bottom:1rem;width:100%;padding:1rem 1.2rem;border:2px solid #e2e8f0;border-radius:12px;outline:none;font-size:1rem;transition:border-color .3s ease, box-shadow .3s ease;box-sizing:border-box;}
    input:focus{border-color:#0284c7;box-shadow:0 0 0 4px rgba(2,132,199,.15)}
    button{width:100%;padding:1rem 1.2rem;border:0;border-radius:12px;background:linear-gradient(135deg,#0284c7,#0369a1);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s ease, box-shadow .2s ease}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(2,132,199,.3)}
    .note{font-size:.9rem;margin-top:1rem;color:#64748b;text-align:center}
    .back-link{display:block;text-align:center;margin-top:1.5rem;color:#0284c7;text-decoration:none;font-weight:600;transition:color .2s ease}
    .back-link:hover{color:#0369a1}
    #admin-message{text-align:center;font-weight:600;margin-top:1rem}
  </style>
</head>
<body>
  <div class="card">
    <h1>Mode Admin</h1>
    <p>Masukkan username dan password untuk membuka akses edit narasi, gambar, dan link YouTube.</p>
    <form id="admin-login-form">
      <input id="admin-username" type="text" placeholder="Username" required />
      <input id="admin-password" type="password" placeholder="Password" required />
      <button type="submit" id="login-btn">Masuk ke Mode Edit</button>
    </form>
    <p class="note">Akun demo: <strong>admin</strong> / <strong>demangan2026</strong></p>
    <p id="admin-message"></p>
    <a href="index.html" class="back-link">← Kembali ke Halaman Utama</a>
  </div>
  <script>
    const form = document.getElementById('admin-login-form');
    const msg = document.getElementById('admin-message');
    const btn = document.getElementById('login-btn');
    
    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      msg.textContent = '';
      
      const user = document.getElementById('admin-username').value;
      const pass = document.getElementById('admin-password').value;
      
      btn.disabled = true;
      btn.textContent = 'Memeriksa...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        
        const data = await response.json();
        
        if (response.ok && data.token) {
          sessionStorage.setItem('ecoEnzimToken', data.token);
          window.location.href = 'index.html';
        } else {
          msg.textContent = data.error || 'Username atau password salah.';
          msg.style.color = '#e23b3b';
        }
      } catch (e) {
        msg.textContent = 'Gagal terhubung ke server. Coba lagi.';
        msg.style.color = '#e23b3b';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Masuk ke Mode Edit';
      }
    });
  </script>
</body>
</html>
